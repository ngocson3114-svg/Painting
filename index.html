<!DOCTYPE html>
<html>
<head>
  <title>Ngoc Son Miniature Studio</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* HEADER */
    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #111;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    /* HAMBURGER */
    .menu-icon {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 0;
      right: -200px;
      width: 200px;
      height: 100%;
      background: #111;
      padding-top: 60px;
      transition: 0.3s;
    }

    .menu a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }

    .menu.open {
      right: 0;
    }

    /* GALLERY GRID */
    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    .gallery img {
      width: 100%;
      border-radius: 16px;
      display: block;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div id="menu" class="menu">
    <a href="#">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- HEADER -->
  <header>
    <h1>Ngoc Son Miniature Studio</h1>
  </header>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="mini1.jpg" onclick="openLightbox(this)">
    <img src="mini2.jpg" onclick="openLightbox(this)">
    <img src="mini3.jpg" onclick="openLightbox(this)">
    <img src="mini4.jpg" onclick="openLightbox(this)">
  </div>

  <!-- CONTACT -->
  <div id="contact" style="padding: 30px; text-align:center; border-top:1px solid #111;">
    <p>Instagram: yourname</p>
    <p>Email: your@email.com</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    function openLightbox(img) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
