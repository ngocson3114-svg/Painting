<!DOCTYPE html>
<html>
<head>
  <title>Age of Painting</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid #111;
    }

    /* LOGO */
    .logo {
      height: 50px;
    }

    .logo img {
      height: 100%;
    }

    /* MENU ICON */
    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 0;
      right: -220px;
      width: 220px;
      height: 100%;
      background: #111;
      padding-top: 60px;
      transition: 0.3s;
    }

    .menu a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
    }

    .menu.open {
      right: 0;
    }

    /* TITLE */
    .title {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .main-title {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0;

      /* NMM METAL EFFECT */
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #e6d3a3 25%,
        #b8965a 40%,
        #5c4a2d 50%,
        #b8965a 60%,
        #fff2cc 75%,
        #ffffff 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      /* engraved + glow */
      text-shadow:
        0 1px 0 #000,
        0 2px 3px rgba(0,0,0,0.8),
        0 0 8px rgba(255, 220, 150, 0.15);
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .gallery img {
      width: 100%;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    /* CONTACT */
    #contact {
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid #111;
    }

    #contact h2 {
      margin-bottom: 10px;
    }

    #contact p {
      color: #aaa;
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <img src="logo.png" alt="logo">
    </div>

    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>

  <!-- MENU -->
  <div id="menu" class="menu">
    <a href="#">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- TITLE -->
  <div class="title">
    <h1 class="main-title">Age of Painting</h1>
    <div class="subtitle">Miniature • One man Studio</div>
  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="mini1.jpg" onclick="openLightbox(this)">
    <img src="mini2.jpg" onclick="openLightbox(this)">
    <img src="mini3.jpg" onclick="openLightbox(this)">
    <img src="mini4.jpg" onclick="openLightbox(this)">
  </div>

  <!-- CONTACT -->
  <div id="contact">
    <h2>Contact</h2>
    <p>Instagram: yourname</p>
    <p>Email: your@email.com</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    function openLightbox(img) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
