<!DOCTYPE html>
<html>
<head>
  <title>My Miniature Studio</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* HEADER */
    header {
      padding: 40px 20px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    /* HAMBURGER */
    .menu-icon {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 30px;
      cursor: pointer;
      z-index: 1000;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 0;
      left: -200px;
      width: 200px;
      height: 100%;
      background: #111;
      padding-top: 60px;
      transition: 0.3s;
    }

    .menu a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }

    .menu a:hover {
      background: #333;
    }

    .menu.open {
      left: 0;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      opacity: 0.7;
    }

    /* MAKE FIRST IMAGE BIG */
    .gallery img:first-child {
      grid-row: span 2;
    }

    /* CONTACT */
    #contact {
      padding: 40px 20px;
      border-top: 1px solid #333;
    }

    /* LIGHTBOX (click zoom) */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div id="menu" class="menu">
    <a href="#portfolio" onclick="toggleMenu()">Portfolio</a>
    <a href="#contact" onclick="toggleMenu()">Contact</a>
  </div>

  <!-- HEADER -->
  <header>
    <h1>My Miniature Painting Studio</h1>
    <p>High contrast • NMM • Fantasy miniatures</p>
  </header>

  <!-- PORTFOLIO -->
  <div id="portfolio" class="gallery">
    <img src="mini1.jpg" onclick="openLightbox(this)">
    <img src="mini2.jpg" onclick="openLightbox(this)">
    <img src="mini3.jpg" onclick="openLightbox(this)">
    <img src="mini4.jpg" onclick="openLightbox(this)">
  </div>

  <!-- CONTACT -->
  <div id="contact">
    <h2>Contact</h2>
    <p>Instagram: yourname</p>
    <p>Email: your@email.com</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    function openLightbox(img) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
