<!DOCTYPE html>
<html>
<head>
  <title>Ngoc Son Miniature Studio</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    h1 {
      font-size: 28px;
      margin: 0;
      letter-spacing: 1px;
    }

    p {
      color: #aaa;
      margin-top: 10px;
    }

    /* HAMBURGER */
    .menu-icon {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      cursor: pointer;
      z-index: 1000;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 0;
      left: -220px;
      width: 220px;
      height: 100%;
      background: #111;
      padding-top: 80px;
      transition: 0.3s;
      box-shadow: 5px 0 20px rgba(0,0,0,0.5);
    }

    .menu a {
      display: block;
      padding: 15px 20px;
      color: #eee;
      text-decoration: none;
      font-size: 16px;
    }

    .menu a:hover {
      background: #222;
    }

    .menu.open {
      left: 0;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:first-child {
      grid-row: span 2;
    }

    .gallery img:hover {
      transform: scale(1.02);
      opacity: 0.85;
    }

    /* CONTACT */
    #contact {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px;
      border-top: 1px solid #222;
      text-align: center;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 92%;
      max-height: 92%;
      border-radius: 10px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .gallery img:first-child {
        grid-row: span 1;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div id="menu" class="menu">
    <a href="#portfolio" onclick="toggleMenu()">Portfolio</a>
    <a href="#contact" onclick="toggleMenu()">Contact</a>
  </div>

  <!-- HEADER -->
  <header>
    <h1>Ngoc Son Miniature Studio</h1>
    <p>High Contrast • NMM • Display Level</p>
  </header>

  <!-- PORTFOLIO -->
  <div id="portfolio" class="gallery">
    <img src="mini1.jpg" onclick="openLightbox(this)">
    <img src="mini2.jpg" onclick="openLightbox(this)">
    <img src="mini3.jpg" onclick="openLightbox(this)">
    <img src="mini4.jpg" onclick="openLightbox(this)">
  </div>

  <!-- CONTACT -->
  <div id="contact">
    <h2>Contact</h2>
    <p>Instagram: yourname</p>
    <p>Email: your@email.com</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    function openLightbox(img) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
