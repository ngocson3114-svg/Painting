<!DOCTYPE html>
<html>
<head>
  <title>Age of Painting</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #111;
      position: sticky;
      top: 0;
      background: black;
      z-index: 1000;
    }

    .logo {
      height: 45px;
    }

    .logo img {
      height: 100%;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 0;
      right: -220px;
      width: 220px;
      height: 100%;
      background: #111;
      padding-top: 60px;
      transition: 0.3s;
    }

    .menu a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }

    .menu.open {
      right: 0;
    }

    /* TITLE */
    .title {
      text-align: center;
      padding: 25px 15px 10px;
    }

    .main-title {
      font-family: 'Cinzel', serif;
      font-size: 40px;
      font-weight: 800;

      background: linear-gradient(
        180deg,
        #ffffff,
        #ffd700 30%,
        #a67c00 50%,
        #ffd700 70%,
        #ffffff
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 2px 4px rgba(0,0,0,0.9),
        0 0 10px rgba(255,215,0,0.2);
    }

    .subtitle {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      cursor: pointer;

      /* blur loading */
      filter: blur(10px);
      transition: 0.4s;
    }

    .grid img.loaded {
      filter: blur(0);
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    /* CONTACT */
    #contact {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid #111;
    }

    #contact a {
      color: #ffd700;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <img src="logo.png">
    </div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>

  <!-- MENU -->
  <div id="menu" class="menu">
    <a href="#">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- TITLE -->
  <div class="title">
    <h1 class="main-title">Age of Painting</h1>
    <div class="subtitle">Miniature • One man Studio</div>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- CONTACT -->
  <div id="contact">
    <h2>CONTACT</h2>
    <p>
      <a href="https://www.instagram.com/ngocson2412" target="_blank">
        @ngocson2412
      </a>
    </p>
    <p>letc.son@gmail.com</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    function openLightbox(img) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }

    // YOUR ORIGINAL IMAGES (jpeg/png)
    const images = [
      "IMG_3333.jpeg",
      "IMG_3115.jpeg",
      "IMG_2970.jpeg",
      "IMG_2531.jpeg",
      "IMG_2294.png",
      "IMG_7659.jpeg",
      "IMG_1890.jpeg",
      "IMG_1566.jpeg",
      "IMG_1348.jpeg",
      "IMG_1269.jpeg",
      "IMG_1077.jpeg",
      "IMG_0773.jpeg",
      "IMG_0730.jpeg",
      "IMG_0507.jpeg",
      "IMG_0427.jpeg",
      "IMG_0383.jpeg"
    ];

    const grid = document.getElementById("grid");

    images.forEach(src => {
      const img = document.createElement("img");
      img.src = src;

      // lazy load
      img.loading = "lazy";

      // blur effect
      img.onload = () => {
        img.classList.add("loaded");
      };

      img.onclick = () => openLightbox(img);

      grid.appendChild(img);
    });
  </script>

</body>
</html>
